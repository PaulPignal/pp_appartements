version: 2

models:
  - name: stg_dvf__raw
    description: >
      Raw DVF rows loaded from the official data.gouv.fr text files extracted
      locally into data/dvf/raw.

  - name: stg_dvf__mutations
    description: >
      Cleaned DVF staging model with normalized column names and basic type casts
      for core mutation fields.
    columns:
      - name: mutation_id
        tests:
          - not_null
      - name: date_mutation
        tests:
          - not_null
